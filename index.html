<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090b;--bg2:#0b0e12;--bg3:#0f1318;
  --wire:#1a2330;--wire-dim:#111820;--border:#1c2530;
  --gold:#c9a84c;--gold-dim:#7a5f28;--gold-dark:#3a2e10;--gold-hi:#e8c96a;
  --teal:#3ab8c8;--teal-dim:#1a5a62;--teal-dark:#0a2a30;
  --text:#c8bda0;--text2:#6e6450;--text3:#332e1e;
  --mono:'Share Tech Mono','Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--wire-dim) 1px,transparent 1px),linear-gradient(90deg,var(--wire-dim) 1px,transparent 1px);background-size:48px 48px;opacity:.12;pointer-events:none;z-index:0}

.shell{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:16px 20px 12px;gap:12px}

/* TOPBAR — bigger name */
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--gold-dark);flex-shrink:0}
.tb-name{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:.08em;line-height:1}
.tb-sub{font-size:11px;color:var(--gold-dim);letter-spacing:.1em;margin-top:5px}
.tb-sub span{color:var(--text3)}
.tb-right{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--teal-dim)}
.clkdot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.12}}

/* 50/50 split */
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:0;border:1px solid var(--border)}

.mux-col{border-right:1px solid var(--border);background:var(--bg);position:relative;overflow:hidden}
.mux-col svg{position:absolute;inset:0;width:100%;height:100%}

.disp-col{display:flex;flex-direction:column;background:var(--bg);min-height:0;overflow:hidden}
.disp-header{padding:10px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.1em;background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.disp-teal{height:1px;background:var(--teal-dark);flex-shrink:0}
.disp-items{flex:1 1 0;overflow-y:auto;overflow-x:hidden;min-height:0}
.disp-items::-webkit-scrollbar{width:4px}
.disp-items::-webkit-scrollbar-track{background:var(--bg2)}
.disp-items::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:2px}
.disp-items::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

.disp-item{border-bottom:1px solid var(--wire-dim);padding:16px 20px;cursor:pointer;transition:background .1s;position:relative}
.disp-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal-dark);transition:background .12s}
.disp-item:hover{background:var(--bg3)}
.disp-item:hover::before,.disp-item.sel::before{background:var(--teal)}
.disp-item.sel{background:var(--bg3)}
.di-addr{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.di-label{font-size:15px;font-weight:700;color:var(--text2);letter-spacing:.04em;margin-bottom:8px}
.disp-item.sel .di-label{color:var(--gold)}
.di-tags{display:flex;flex-wrap:wrap;gap:4px}
.di-tag{font-size:10px;font-weight:700;padding:2px 7px;border:1px solid var(--teal-dark);color:var(--teal-dim);letter-spacing:.05em}

.bottom{flex-shrink:0;border:1px solid var(--border);border-top:none;display:grid;grid-template-columns:1fr auto;background:var(--bg2);height:110px}
.det-area{padding:12px 20px;display:flex;flex-direction:column;gap:4px;justify-content:center;overflow:hidden;min-width:0}
.det-placeholder{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em}
.det-addr{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em}
.det-title{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.det-body{font-size:11px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.det-tags{display:flex;flex-wrap:nowrap;gap:4px;margin-top:4px;overflow:hidden}
.det-tag{font-size:10px;font-weight:700;padding:2px 7px;border:1px solid var(--gold-dark);color:var(--gold-dim);letter-spacing:.04em;white-space:nowrap;flex-shrink:0}

.footer-strip{border-left:1px solid var(--border);padding:10px 16px;display:flex;flex-direction:column;justify-content:space-between;gap:7px}
.flink{font-size:10px;font-weight:700;color:var(--gold-dim);text-decoration:none;padding:3px 10px;border:1px solid var(--gold-dark);letter-spacing:.08em;transition:color .12s,border-color .12s,background .12s;white-space:nowrap;text-align:center;display:block}
.flink:hover{color:var(--gold-hi);border-color:var(--gold);background:var(--bg3)}
</style>
</head>

const KEYS=['skills','experience','projects','education','hobbies','contact'];
const Y={skills:54,experience:136,projects:218,education:300,hobbies:382,contact:464};
let cur='skills';

function muxSel(key){
  cur=key;
  const d=DATA[key];
  KEYS.forEach(k=>{
    const on=k===key;
    document.getElementById('sn-'+k).setAttribute('stroke',on?'#c9a84c':'#1c2530');
    document.getElementById('sn-'+k).setAttribute('fill',on?'#0f1318':'#0b0e12');
    document.getElementById('st-'+k).setAttribute('fill',on?'#c9a84c':'#6e6450');
    document.getElementById('w-'+k).setAttribute('stroke',on?'#c9a84c':'#1a2330');
    document.getElementById('w-'+k).setAttribute('stroke-width',on?'2':'1');
    document.getElementById('dot-'+k).setAttribute('fill',on?'#c9a84c':'#1a2330');
    document.getElementById('dot-'+k).setAttribute('r',on?'4':'3');
  });
  const en=document.getElementById('mux-energy');
  const ey=Y[key];
  en.setAttribute('y1',ey);en.setAttribute('y2',ey);
  en.setAttribute('x1','224');en.setAttribute('x2','270');en.setAttribute('opacity','1');
  const ow=document.getElementById('out-wire');
  const or=document.getElementById('outreg');
  const dw=document.getElementById('data-wire');
  ow.setAttribute('stroke','#c9a84c');ow.setAttribute('marker-end','url(#arr-gold)');
  dw.setAttribute('stroke','#c9a84c');dw.setAttribute('marker-end','url(#arr-gold)');
  or.setAttribute('stroke','#c9a84c');
  document.getElementById('sel-disp').textContent='= '+d.sel;
  document.getElementById('or-mode').textContent=d.label;
  document.getElementById('or-addr').textContent=d.addr;
  document.getElementById('disp-mode').textContent=d.label;
  const c=document.getElementById('disp-items');
  c.innerHTML='';
  d.items.forEach((it,i)=>{
    const el=document.createElement('div');
    el.className='disp-item';
    el.innerHTML=`<div class="di-addr">[${String(i).padStart(2,'0')}]</div><div class="di-label">${it.l}</div><div class="di-tags">${it.t.split('·').slice(0,4).map(t=>`<span class="di-tag">${t.trim()}</span>`).join('')}</div>`;
    el.onclick=()=>{
      document.querySelectorAll('.disp-item').forEach(e=>e.classList.remove('sel'));
      el.classList.add('sel');
      document.getElementById('det-ph').style.display='none';
      const di=document.getElementById('det-inner');
      di.style.display='flex';di.style.flexDirection='column';di.style.gap='3px';
      document.getElementById('det-addr').textContent=`[${String(i).padStart(2,'0')}] ${d.label} //`;
      document.getElementById('det-title').textContent=it.l;
      document.getElementById('det-body').textContent=it.d;
      const tc=document.getElementById('det-tags');tc.innerHTML='';
      it.t.split('·').forEach(t=>{const s=document.createElement('span');s.className='det-tag';s.textContent=t.trim();tc.appendChild(s)});
    };
    c.appendChild(el);
  });
  document.getElementById('det-ph').style.display='block';
  document.getElementById('det-inner').style.display='none';
}
